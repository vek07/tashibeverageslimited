<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration - Tashi Beverages Ltd</title>
    <link rel="stylesheet" href="assets/css/admin.css">
    <style>
        :root{
            --bg-start: #66ddea;
            --bg-end: #4b9abc;
            --card-bg: #fcfcfc;
            --accent: #667eea;
            --muted: #6b7280;
            --radius: 16px;
        }

        html,body{height:100%;}
        body{font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;}

        .register-container {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .register-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: 0 12px 30px rgba(12,20,35,0.12);
            width: 100%;
            max-width: 720px;
            border: 1px solid rgba(16,24,40,0.04);
        }

        .register-header { text-align: center; margin-bottom: 1.25rem; }
        .register-header h1 { color: #0f1724; margin-bottom: 0.25rem; font-size: 1.6rem; }
        .register-header p { color: var(--muted); font-size: 0.95rem; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display:block; margin-bottom:0.4rem; color:#0f1724; font-weight:600; font-size:0.95rem; }

        .form-group input, .form-group select {
            width:100%; padding:12px 14px; border:1px solid #e6edf3; border-radius:12px; font-size:0.98rem; background:#fff;
            transition: all .18s ease; box-shadow: 0 1px 0 rgba(16,24,40,0.02) inset;
        }

        .form-group input:focus, .form-group select:focus{ outline:none; border-color: var(--accent); box-shadow: 0 6px 20px rgba(102,126,234,0.08); }

        .form-group small{ color:var(--muted); font-size:0.82rem; }

        .register-btn{ background: linear-gradient(135deg,var(--accent),#764ba2); color:#fff; border:none; padding:14px; border-radius:999px; font-weight:700; font-size:1rem; width:100%; cursor:pointer; }
        .register-btn:hover{ transform: translateY(-2px); box-shadow: 0 12px 30px rgba(102,126,234,0.18); }

        .login-link{ margin-top:1rem; text-align:center; color:var(--muted); }
        .login-link a{ color:var(--accent); text-decoration:none; font-weight:600; }

        .success-message, .error-message{ padding:10px 12px; border-radius:10px; margin-bottom:12px; display:none; font-size:0.95rem; }
        .success-message{ background:#e6ffed; color:#04481a; }
        .error-message{ background:#fff1f2; color:#7f1d1d; }

        .password-strength{ margin-top:6px; font-size:0.85rem; }
        .strength-weak{ color:#dc3545 } .strength-medium{ color:#d97706 } .strength-strong{ color:#16a34a }

        .requirement-list{ font-size:0.85rem; color:var(--muted); margin-top:0.5rem; padding-left:1.2rem; }
        .requirement-list li{ margin-bottom:0.25rem; }
        .requirement-met{ color:#16a34a; font-weight:600; }

        @media (max-width: 900px){ .register-card{ max-width:640px; padding:2rem;} }
        @media (max-width: 680px){ .form-row{ grid-template-columns:1fr; } .register-card{ padding:1.5rem; } .register-header h1{ font-size:1.4rem; } }
        @media (max-width:420px){ .register-card{ padding:1rem; border-radius:12px; } .register-header p{ font-size:0.88rem } .register-btn{ padding:12px } }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h1>Admin Registration</h1>
                <p>Create a new admin account for Tashi Beverages</p>
            </div>

            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message"></div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="username">Username *</label>
                    <input type="text" id="username" name="username" required minlength="4">
                    <small>Minimum 4 characters</small>
                </div>

                <div class="form-group">
                    <label for="role">Select Role *</label>
                    <select id="role" name="role" required>
                        <option value="">Choose your role</option>
                        <option value="hr">Human Resources</option>
                        <option value="gm">General Manager</option>
                        <option value="sm">Sales Manager</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" required minlength="8">
                    <div id="passwordStrength" class="password-strength"></div>
                    <ul class="requirement-list">
                        <li id="req-length">At least 8 characters</li>
                        <li id="req-uppercase">One uppercase letter</li>
                        <li id="req-lowercase">One lowercase letter</li>
                        <li id="req-number">One number</li>
                    </ul>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                    <div id="passwordMatch"></div>
                </div>

                <div class="form-group">
                    <label for="accessCode">Company Access Code *</label>
                    <input type="text" id="accessCode" name="accessCode" required>
                    <small>Contact IT for the code</small>
                </div>

                <button type="submit" class="register-btn">Register Now</button>
            </form>

            <div class="login-link">
                <p>Already have an account? <a href="admin-login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <script>
        const COMPANY_ACCESS_CODE = 'tashi2025';

        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strengthDiv = document.getElementById('passwordStrength');
            
            let strength = 0;
            const requirements = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /[0-9]/.test(password)
            };

            document.getElementById('req-length').className = requirements.length ? 'requirement-met' : '';
            document.getElementById('req-uppercase').className = requirements.uppercase ? 'requirement-met' : '';
            document.getElementById('req-lowercase').className = requirements.lowercase ? 'requirement-met' : '';
            document.getElementById('req-number').className = requirements.number ? 'requirement-met' : '';

            Object.values(requirements).forEach(met => { if(met) strength++; });

            if (password.length === 0) {
                strengthDiv.textContent = '';
            } else if (strength <= 2) {
                strengthDiv.textContent = 'Weak password';
                strengthDiv.className = 'password-strength strength-weak';
            } else if (strength === 3) {
                strengthDiv.textContent = 'Medium password';
                strengthDiv.className = 'password-strength strength-medium';
            } else {
                strengthDiv.textContent = 'Strong password';
                strengthDiv.className = 'password-strength strength-strong';
            }
        });

        document.getElementById('confirmPassword').addEventListener('input', function() {
            const password = document.getElementById('password').value;
            const confirmPassword = this.value;
            const matchDiv = document.getElementById('passwordMatch');

            if (confirmPassword.length === 0) {
                matchDiv.textContent = '';
            } else if (password === confirmPassword) {
                matchDiv.textContent = '✓ Passwords match';
                matchDiv.style.color = '#28a745';
            } else {
                matchDiv.textContent = '✗ Passwords do not match';
                matchDiv.style.color = '#dc3545';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const accessCode = document.getElementById('accessCode').value.trim();

            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (accessCode !== COMPANY_ACCESS_CODE) {
                errorDiv.textContent = 'Invalid access code. Please contact IT department.';
                errorDiv.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match.';
                errorDiv.style.display = 'block';
                return;
            }

            if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}/.test(password)) {
                errorDiv.textContent = 'Password must meet all requirements.';
                errorDiv.style.display = 'block';
                return;
            }

            const newAdmin = {
                firstName,
                lastName,
                email,
                username,
                role,
                createdAt: new Date().toISOString()
            };

            const admins = JSON.parse(localStorage.getItem('registeredAdmins')) || [];
            
            if (admins.some(admin => admin.username === username)) {
                errorDiv.textContent = 'Username already exists. Please choose another.';
                errorDiv.style.display = 'block';
                return;
            }

            admins.push(newAdmin);
            localStorage.setItem('registeredAdmins', JSON.stringify(admins));

            successDiv.textContent = 'Registration successful! Redirecting to login...';
            successDiv.style.display = 'block';

            setTimeout(() => {
                window.location.href = 'admin-login.html';
            }, 2000);
        });
    </script>
</body>
</html>
