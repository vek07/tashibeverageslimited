<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Tashi Beverages Limited</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #455b5b36 0%, #2825258c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            background: linear-gradient(135deg, #ed03ed9b 0%, #0f4ca892 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(78, 164, 79, 0.753);
            overflow: hidden;
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .login-left {
            background: linear-gradient(135deg, #088680a4 0%, #a551a5 100%);
            padding: 3rem;
            color: rgb(255, 253, 253);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .logo i {
            font-size: 2.5rem;
        }

        .logo h1 {
            font-size: 1.8rem;
        }

        .login-left h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .login-left p {
            font-size: 1.1rem;
            opacity: 0.9;
            line-height: 1.6;
        }

        .features {
            margin-top: 2rem;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .feature-item i {
            width: 40px;
            height: 40px;
            background: rgba(140, 85, 164, 0.979);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .login-right {
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-header {
            margin-bottom: 2rem;
        }

        .login-header h3 {
            font-size: 1.8rem;
            color: #fbfbfb;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #f5f1f1;
        }

        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .alert.success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #38a169;
        }

        .alert.error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #e53e3e;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #435065;
            font-weight: 500;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .role-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .role-option {
            position: relative;
        }

        .role-option input[type="radio"] {
            display: none;
        }

        .role-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            border: 2px solid #083f9100;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .role-label i {
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .role-label span {
            font-size: 0.85rem;
            font-weight: 500;
            color: #f6f6f6;
        }

        .role-option input[type="radio"]:checked + .role-label {
            border-color: #56ea0cbe;
            background: rgba(102, 234, 179, 0.518);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group input {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
        }

        .forgot-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-login {
            background: linear-gradient(135deg, #0b91a0, #85237680);
            color: rgb(255, 255, 255);
            border: none;
            padding: 0.875rem;
            border-radius: 115px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(36, 78, 216, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .loading-spinner {
            width: 1rem;
            height: 1rem;
            border: 2px solid white;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .register-link {
            margin-top: 1.5rem;
            text-align: center;
        }

        .register-link a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .login-container {
                grid-template-columns: 1fr;
            }
            
            .login-left {
                padding: 2rem;
            }
            
            .role-selector {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="logo">
                <i class="fas fa-wine-bottle"></i>
                <h1>Tashi Beverages</h1>
            </div>
            <h2>Admin Dashboard</h2>
            <p>Manage your products, news, and announcements with our intuitive dashboard.</p>
            <div class="features">
                <div class="feature-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Real-time Analytics</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-users"></i>
                    <span>User Management</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-cog"></i>
                    <span>Custom Settings</span>
                </div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-header">
                <h3>✨ Welcome Back ✨</h3>
                <p>Please sign in to your account</p>
            </div>
            <div id="alertBox" class="alert"></div>
            <form id="loginForm">
                <div class="role-selector">
                    <div class="role-option">
                        <input type="radio" id="role-gm" name="role" value="gm">
                        <label class="role-label" for="role-gm">
                            <i class="fas fa-user-tie"></i>
                            <span>General Manager</span>
                        </label>
                    </div>
                    <div class="role-option">
                        <input type="radio" id="role-hr" name="role" value="hr">
                        <label class="role-label" for="role-hr">
                            <i class="fas fa-users-cog"></i>
                            <span>HR Manager</span>
                        </label>
                    </div>
                    <div class="role-option">
                        <input type="radio" id="role-sm" name="role" value="sm">
                        <label class="role-label" for="role-sm">
                            <i class="fas fa-chart-bar"></i>
                            <span>Sales Manager</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" class="form-control" placeholder="Enter username" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                    </div>
                </div>

                <div class="remember-forgot">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember">
                        <label for="remember" style="margin: 0; color: #f6f8fc; cursor: pointer;">Remember me</label>
                    </div>
                    <a href="index.html" class="forgot-link">Back to Home</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Sign In</span>
                </button>

            </form>

            <div class="register-link">
                <p>New admin? <a href="admin-registration.html">Register here</a></p>
            </div>
        </div>
    </div>

    <script>
        const adminCredentials = {
            gm: {
                username: 'gm_admin',
                password: 'gm123456',
                role: 'General Manager',
                roleCode: 'gm',
                permissions: ['products', 'news', 'announcements', 'users', 'settings', 'analytics']
            },
            hr: {
                username: 'hr_admin',
                password: 'hr123456',
                role: 'HR Manager',
                roleCode: 'hr',
                permissions: ['news', 'announcements', 'settings']
            },
            sm: {
                username: 'sm_admin',
                password: 'sm123456',
                role: 'Sales Manager',
                roleCode: 'sm',
                permissions: ['products', 'announcements', 'settings']
            }
        };

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const alertBox = document.getElementById('alertBox');

        function showAlert(message, type = 'error') {
            alertBox.textContent = message;
            alertBox.className = `alert ${type}`;
            alertBox.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    alertBox.style.display = 'none';
                }, 2000);
            }
        }

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const role = document.querySelector('input[name="role"]:checked');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            if (!role) {
                showAlert('Please select your role');
                return;
            }

            if (!username || !password) {
                showAlert('Please enter username and password');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<div class="loading-spinner"></div><span>Signing in...</span>';

            setTimeout(() => {
                const selectedRole = role.value;
                const credentials = adminCredentials[selectedRole];

                if (credentials.username === username && credentials.password === password) {
                    const session = {
                        username: credentials.username,
                        role: credentials.role,
                        roleCode: credentials.roleCode,
                        permissions: credentials.permissions,
                        loginTime: new Date().toISOString(),
                        fullName: credentials.role
                    };

                    if (remember) {
                        localStorage.setItem('adminSession', JSON.stringify(session));
                    } else {
                        sessionStorage.setItem('adminSession', JSON.stringify(session));
                    }

                    showAlert('Welcome back!', 'success');

                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1500);

                } else {
                    showAlert('Invalid credentials. Please check your username and password.');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>Sign In</span>';
                }
            }, 1000);
        });

        document.querySelectorAll('input[name="role"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const credentials = adminCredentials[this.value];
                document.getElementById('username').placeholder = `Try: ${credentials.username}`;
                document.getElementById('password').placeholder = `Try: ${credentials.password}`;
            });
        });

        window.addEventListener('DOMContentLoaded', () => {
            const session = localStorage.getItem('adminSession') || sessionStorage.getItem('adminSession');
            if (session) {
                window.location.href = 'admin-dashboard.html';
            }
        });
    </script>
</body>
</html>
